<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="stylesheet" href="style.css">
    <script src="js.js" defer></script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculator</title>
</head>
<body>
    <h1>Calculator</h1>
    <div class="container">

        <div class="text">

        </div>

        <div class="buttons">
            <div class="row">
                <button class="AC">AC</button>
                <button class="percent">%</button>
                <button class="del"><-</button>
                <button class="division">/</button>
                </div>
            <div class="row">
                <button class="n7 number">7</button>
                <button class="n8 number">8</button>
                <button class="n9 number">9</button>
                <button class="multiply">X</button>
            </div>
            <div class="row">
                <button class="n4 number">4</button>
                <button class="n5 number">5</button>
                <button class="n6 number">6</button>
                <button class="minus">-</button>
            </div>
            <div class="row">
                <button class="n1 number">1</button>
                <button class="n2 number">2</button>
                <button class="n3 number">3</button>
                <button class="add">+</button>
            </div>
            <div class="row">
                <button class="n00 number">00</button>
                <button class="n0 number">0</button>
                <button class="dot number">.</button>
                <button class="equal">=</button>
            </div>
        </div>
    </div>
</body>
</html>
