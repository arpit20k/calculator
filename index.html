<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="stylesheet" href="style.css">
    <script src=""js.js defer></script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculator</title>
</head>
<body>
    <h1>Calculator</h1>
    <div class="container">

        <div class="text">

        </div>

        <div class="buttons">
            <div class="row">
                <button class="AC">AC</button>;
                <button class="%">%</button>;
                <button class="delete"><-</button>;
                <button class="division">/</button>;
            </div>
            <div class="row">
                <button class="7 number">7</button>;
                <button class="8 number">8</button>;
                <button class="9 number">9</button>;
                <button class="multiply">X</button>;
            </div>
            <div class="row">
                <button class="4 number">4</button>;
                <button class="5 number">5</button>;
                <button class="6 number">6</button>;
                <button class="minus">-</button>;
            </div>
            <div class="row">
                <button class="1 number">1</button>;
                <button class="2 number">2</button>;
                <button class="3 number">3</button>;
                <button class="add">+</button>;
            </div>
            <div class="row">
                <button class="00 number">00</button>;
                <button class="0 number">0</button>;
                <button class=". number">.</button>;
                <button class="=">=</button>;
            </div>
        </div>
    </div>
</body>
</html>
